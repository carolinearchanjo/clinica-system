<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicaFácil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #faf8f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .box { max-width: 400px; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a6b4a; margin-bottom: 8px; }
    p { color: #5a5a5a; font-size: 15px; margin-bottom: 24px; }
    a {
      display: inline-block;
      background: #1a6b4a;
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }
    a:hover { background: #2d9b6f; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🏥</div>
    <h1>ClinicaFácil</h1>
    <p>Página não encontrada ou erro ao carregar o sistema.<br/>Tente novamente ou volte ao início.</p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
